services:

  # ── Cluster Manager dédié (ne stocke pas de données) ─────────
  opensearch-node1:
    image: opensearchproject/opensearch:3.4.0
    container_name: os-manager1
    entrypoint: ["/bin/bash", "/scripts/start.sh"]
    environment:
      - cluster.name=opensearch-cluster
      - node.name=os-manager1
      - node.roles=cluster_manager
      - discovery.seed_hosts=os-manager1,os-data1,os-data2,os-data3,os-coord1
      - cluster.initial_cluster_manager_nodes=os-manager1
      - bootstrap.memory_lock=true
      - path.repo=/mnt/snapshots
      # Transport layer (inter-nœuds)
      - plugins.security.ssl.transport.pemcert_filepath=certs/node.pem
      - plugins.security.ssl.transport.pemkey_filepath=certs/node-key.pem
      - plugins.security.ssl.transport.pemtrustedcas_filepath=certs/root-ca.pem
      - plugins.security.ssl.transport.enforce_hostname_verification=false
      # REST layer (HTTPS)
      - plugins.security.ssl.http.enabled=true
      - plugins.security.ssl.http.pemcert_filepath=certs/http.pem
      - plugins.security.ssl.http.pemkey_filepath=certs/http-key.pem
      - plugins.security.ssl.http.pemtrustedcas_filepath=certs/root-ca.pem
      - plugins.security.restapi.roles_enabled=["all_access","security_rest_api_access"]
      # DN autorisés
      - plugins.security.authcz.admin_dn=["CN=admin"]
      - plugins.security.nodes_dn=["CN=node"]
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data1:/usr/share/opensearch/data
      - ./snapshots:/mnt/snapshots
      - ./certs:/usr/share/opensearch/config/certs
      - ./scripts/start.sh:/scripts/start.sh:ro
    ports:
      - "9200:9200"
    networks:
      - opensearch-net

  # ── Nœud data n°1 ────────────────────────────────────────────
  opensearch-node2:
    image: opensearchproject/opensearch:3.4.0
    container_name: os-data1
    entrypoint: ["/bin/bash", "/scripts/start.sh"]
    environment:
      - cluster.name=opensearch-cluster
      - node.name=os-data1
      - node.roles=data
      - discovery.seed_hosts=os-manager1,os-data1,os-data2,os-data3,os-coord1
      - cluster.initial_cluster_manager_nodes=os-manager1
      - bootstrap.memory_lock=true
      - path.repo=/mnt/snapshots
      - plugins.security.ssl.transport.pemcert_filepath=certs/node.pem
      - plugins.security.ssl.transport.pemkey_filepath=certs/node-key.pem
      - plugins.security.ssl.transport.pemtrustedcas_filepath=certs/root-ca.pem
      - plugins.security.ssl.transport.enforce_hostname_verification=false
      - plugins.security.ssl.http.enabled=true
      - plugins.security.ssl.http.pemcert_filepath=certs/http.pem
      - plugins.security.ssl.http.pemkey_filepath=certs/http-key.pem
      - plugins.security.ssl.http.pemtrustedcas_filepath=certs/root-ca.pem
      - plugins.security.restapi.roles_enabled=["all_access","security_rest_api_access"]
      - plugins.security.authcz.admin_dn=["CN=admin"]
      - plugins.security.nodes_dn=["CN=node"]
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data2:/usr/share/opensearch/data
      - ./snapshots:/mnt/snapshots
      - ./certs:/usr/share/opensearch/config/certs
      - ./scripts/start.sh:/scripts/start.sh:ro
    networks:
      - opensearch-net

  # ── Nœud data n°2 ────────────────────────────────────────────
  opensearch-node3:
    image: opensearchproject/opensearch:3.4.0
    container_name: os-data2
    entrypoint: ["/bin/bash", "/scripts/start.sh"]
    environment:
      - cluster.name=opensearch-cluster
      - node.name=os-data2
      - node.roles=data
      - discovery.seed_hosts=os-manager1,os-data1,os-data2,os-data3,os-coord1
      - cluster.initial_cluster_manager_nodes=os-manager1
      - bootstrap.memory_lock=true
      - path.repo=/mnt/snapshots
      - plugins.security.ssl.transport.pemcert_filepath=certs/node.pem
      - plugins.security.ssl.transport.pemkey_filepath=certs/node-key.pem
      - plugins.security.ssl.transport.pemtrustedcas_filepath=certs/root-ca.pem
      - plugins.security.ssl.transport.enforce_hostname_verification=false
      - plugins.security.ssl.http.enabled=true
      - plugins.security.ssl.http.pemcert_filepath=certs/http.pem
      - plugins.security.ssl.http.pemkey_filepath=certs/http-key.pem
      - plugins.security.ssl.http.pemtrustedcas_filepath=certs/root-ca.pem
      - plugins.security.restapi.roles_enabled=["all_access","security_rest_api_access"]
      - plugins.security.authcz.admin_dn=["CN=admin"]
      - plugins.security.nodes_dn=["CN=node"]
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data3:/usr/share/opensearch/data
      - ./snapshots:/mnt/snapshots
      - ./certs:/usr/share/opensearch/config/certs
      - ./scripts/start.sh:/scripts/start.sh:ro
    networks:
      - opensearch-net

  # ── Nœud data n°3 ────────────────────────────────────────────
  opensearch-node4:
    image: opensearchproject/opensearch:3.4.0
    container_name: os-data3
    entrypoint: ["/bin/bash", "/scripts/start.sh"]
    environment:
      - cluster.name=opensearch-cluster
      - node.name=os-data3
      - node.roles=data
      - discovery.seed_hosts=os-manager1,os-data1,os-data2,os-data3,os-coord1
      - cluster.initial_cluster_manager_nodes=os-manager1
      - bootstrap.memory_lock=true
      - path.repo=/mnt/snapshots
      - plugins.security.ssl.transport.pemcert_filepath=certs/node.pem
      - plugins.security.ssl.transport.pemkey_filepath=certs/node-key.pem
      - plugins.security.ssl.transport.pemtrustedcas_filepath=certs/root-ca.pem
      - plugins.security.ssl.transport.enforce_hostname_verification=false
      - plugins.security.ssl.http.enabled=true
      - plugins.security.ssl.http.pemcert_filepath=certs/http.pem
      - plugins.security.ssl.http.pemkey_filepath=certs/http-key.pem
      - plugins.security.ssl.http.pemtrustedcas_filepath=certs/root-ca.pem
      - plugins.security.restapi.roles_enabled=["all_access","security_rest_api_access"]
      - plugins.security.authcz.admin_dn=["CN=admin"]
      - plugins.security.nodes_dn=["CN=node"]
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data4:/usr/share/opensearch/data
      - ./snapshots:/mnt/snapshots
      - ./certs:/usr/share/opensearch/config/certs
      - ./scripts/start.sh:/scripts/start.sh:ro
    networks:
      - opensearch-net

  # ── Nœud coordinating only ────────────────────────────────────
  opensearch-coord1:
    image: opensearchproject/opensearch:3.4.0
    container_name: os-coord1
    entrypoint: ["/bin/bash", "/scripts/start.sh"]
    environment:
      - cluster.name=opensearch-cluster
      - node.name=os-coord1
      - node.roles=[]
      - discovery.seed_hosts=os-manager1,os-data1,os-data2,os-data3,os-coord1
      - cluster.initial_cluster_manager_nodes=os-manager1
      - bootstrap.memory_lock=true
      - plugins.security.ssl.transport.pemcert_filepath=certs/node.pem
      - plugins.security.ssl.transport.pemkey_filepath=certs/node-key.pem
      - plugins.security.ssl.transport.pemtrustedcas_filepath=certs/root-ca.pem
      - plugins.security.ssl.transport.enforce_hostname_verification=false
      - plugins.security.ssl.http.enabled=true
      - plugins.security.ssl.http.pemcert_filepath=certs/http.pem
      - plugins.security.ssl.http.pemkey_filepath=certs/http-key.pem
      - plugins.security.ssl.http.pemtrustedcas_filepath=certs/root-ca.pem
      - plugins.security.restapi.roles_enabled=["all_access","security_rest_api_access"]
      - plugins.security.authcz.admin_dn=["CN=admin"]
      - plugins.security.nodes_dn=["CN=node"]
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ./certs:/usr/share/opensearch/config/certs
      - ./scripts/start.sh:/scripts/start.sh:ro
    networks:
      - opensearch-net

  # ── OpenSearch Dashboards ─────────────────────────────────────
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.4.0
    container_name: opensearch-dashboards
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=["https://os-coord1:9200"]
      - OPENSEARCH_USERNAME=kibanaserver
      - OPENSEARCH_PASSWORD=kibanaserver
      - OPENSEARCH_SSL_VERIFICATIONMODE=none
    volumes:
      - ./dashboards/opensearch_dashboards.yml:/usr/share/opensearch-dashboards/config/opensearch_dashboards.yml
      - ./certs:/usr/share/opensearch-dashboards/config/certs:ro
    depends_on:
      - opensearch-coord1
    networks:
      - opensearch-net

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - opensearch-coord1
    networks:
      - opensearch-net

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-opensearch-datasource
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - opensearch-net

  # ── Data Prepper ──────────────────────────────────────────────
  data-prepper:
    image: opensearchproject/data-prepper:2.14.1
    container_name: data-prepper
    ports:
      - "2021:2021"
      - "4900:4900"
      - "21890:21890"
      - "21891:21891"
      - "21892:21892"
    volumes:
      - ./data-prepper/pipelines.yaml:/usr/share/data-prepper/pipelines/pipelines.yaml
      - ./data-prepper/data-prepper-config.yaml:/usr/share/data-prepper/config/data-prepper-config.yaml
      - ./certs/root-ca.pem:/usr/share/data-prepper/certs/root-ca.pem:ro
    depends_on:
      - opensearch-node1
    networks:
      - opensearch-net

volumes:
  opensearch-data1:
  opensearch-data2:
  opensearch-data3:
  opensearch-data4:
  prometheus-data:
  grafana-data:

networks:
  opensearch-net: