      nofile:
        soft: 65536
        hard: 65536
    networks:
      - opensearch-net
    volumes:
      - ./certs:/usr/share/opensearch/config/certs
  #  - ./config/coord/opensearch.yml:/usr/share/opensearch/config/opensearch.yml

  # ── OpenSearch Dashboards ─────────────────────────────────────
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.4.0
    container_name: opensearch-dashboards
    ports:
      - 5601:5601
    expose:
      - "5601"
    environment:
      # Pointe vers le nœud coordinating — point d'entrée recommandé
      - OPENSEARCH_HOSTS=["https://os-coord1:9200"]
      - OPENSEARCH_USERNAME=kibanaserver
      - OPENSEARCH_PASSWORD=kibanaserver
      - OPENSEARCH_SSL_VERIFICATIONMODE=none
    volumes:
    - ./dashboards/opensearch_dashboards.yml:/usr/share/opensearch-dashboards/config/opensearch_dashboards.yml
    - ./certs:/usr/share/opensearch-dashboards/config/certs:ro
    depends_on:
      - opensearch-coord1
    networks:
      - opensearch-net

  # ── Data Prepper ──────────────────────────────────────────────
  data-prepper:
    image: opensearchproject/data-prepper:2.14.1
    container_name: data-prepper
    ports:
      - 2021:2021   # Data Prepper REST API
      - 4900:4900   # Health check / shutdown
      - 21890:21890 # OTLP gRPC (traces, metrics, logs)
      - 21891:21891 # OTLP HTTP
      - 21892:21892 # OTel metrics HTTP
    volumes:
      - ./data-prepper/pipelines.yaml:/usr/share/data-prepper/pipelines/pipelines.yaml
      - ./data-prepper/data-prepper-config.yaml:/usr/share/data-prepper/config/data-prepper-config.yaml
      - ./certs/root-ca.pem:/usr/share/data-prepper/certs/root-ca.pem:ro
    depends_on:
      - opensearch-node1
    networks:
      - opensearch-net

volumes:
  opensearch-data1:
  opensearch-data2:
  opensearch-data3:
  opensearch-data4:

networks:
  opensearch-net: