      - path.repo=/mnt/snapshots
      # Transport layer (inter-nœuds)
      - plugins.security.ssl.transport.pemcert_filepath=certs/node.pem
      - plugins.security.ssl.transport.pemkey_filepath=certs/node-key.pem
      - plugins.security.ssl.transport.pemtrustedcas_filepath=certs/root-ca.pem
      - plugins.security.ssl.transport.enforce_hostname_verification=false

      # REST layer (HTTPS)
      - plugins.security.ssl.http.enabled=true
      - plugins.security.ssl.http.pemcert_filepath=certs/http.pem
      - plugins.security.ssl.http.pemkey_filepath=certs/http-key.pem
      - plugins.security.ssl.http.pemtrustedcas_filepath=certs/root-ca.pem
      - plugins.security.restapi.roles_enabled=["all_access","security_rest_api_access"]

      # DN autorisés
      - plugins.security.authcz.admin_dn=["CN=admin"]
      - plugins.security.nodes_dn=["CN=node"]
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data2:/usr/share/opensearch/data
      - ./snapshots:/mnt/snapshots
      - ./certs:/usr/share/opensearch/config/certs
    networks:
